name: Bridge Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Public API base URL for bridge update bundle URLs
        required: true
        type: string
      channel:
        description: Bridge update channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
      version:
        description: Optional bridge update version override; tag builds default to the v* tag without the v prefix
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: bridge-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-bridge-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            command: npm run package:linux:x64 --workspace @printstream/bridge
            artifact_name: bridge-linux-x64
          - platform: linux
            arch: arm64
            command: npm run package:linux:arm64 --workspace @printstream/bridge
            artifact_name: bridge-linux-arm64
          - platform: windows
            arch: x64
            command: npm run package:win:x64 --workspace @printstream/bridge
            artifact_name: bridge-windows-x64
          - platform: windows
            arch: arm64
            command: npm run package:win:arm64 --workspace @printstream/bridge
            artifact_name: bridge-windows-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install packaging prerequisites
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            nsis \
            squashfs-tools \
            wine32 \
            wine64 \
            xorriso

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared workspaces
        run: |
          npm run build --workspace @printstream/shared
          npm run build --workspace @printstream/bridge-runtime

      - name: Package bridge artifacts
        run: ${{ matrix.command }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/bridge/release/*.deb
            apps/bridge/release/*.tar.gz
            apps/bridge/release/*.AppImage
            apps/bridge/release/*.exe
          if-no-files-found: error

  publish-tag-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-bridge-packages
      - build-bridge-update-bundle
    runs-on: ubuntu-latest

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: bridge-artifacts
          pattern: bridge-*
          merge-multiple: true

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: bridge-artifacts/*

  build-bridge-update-bundle:
    runs-on: ubuntu-latest
    env:
      BRIDGE_UPDATE_API_BASE_URL: ${{ inputs.api_base_url || vars.BRIDGE_UPDATE_API_BASE_URL }}
      BRIDGE_UPDATE_CHANNEL: ${{ inputs.channel || 'stable' }}
      BRIDGE_UPDATE_VERSION: ${{ inputs.version }}
      BRIDGE_UPDATE_PRIVATE_KEY: ${{ secrets.BRIDGE_UPDATE_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate signing configuration
        run: |
          test -n "$BRIDGE_UPDATE_API_BASE_URL" || { echo 'Set workflow input api_base_url or repository variable BRIDGE_UPDATE_API_BASE_URL.'; exit 1; }
          test -n "$BRIDGE_UPDATE_PRIVATE_KEY" || { echo 'Set repository secret BRIDGE_UPDATE_PRIVATE_KEY.'; exit 1; }

      - name: Build signed bridge update bundle
        run: |
          version_args=()
          if [[ -n "$BRIDGE_UPDATE_VERSION" ]]; then
            version_args+=(--version "$BRIDGE_UPDATE_VERSION")
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            version_args+=(--version "${GITHUB_REF_NAME#v}")
          fi
          npm run build --workspace @printstream/shared
          npm run build --workspace @printstream/bridge-runtime
          npm run package:update-bundle:api --workspace @printstream/bridge -- "${version_args[@]}" --api-base-url "$BRIDGE_UPDATE_API_BASE_URL" --channel "$BRIDGE_UPDATE_CHANNEL"

      - name: Upload bridge update bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-update-bundle
          path: data/bridge-releases/*
          if-no-files-found: error