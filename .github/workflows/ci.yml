name: CI

# Runs the full repo validation (lint, tests, typecheck, prisma validate) and
# a production build. Push-to-main coverage matters for the public repo, which
# receives snapshot exports as direct pushes to main rather than PRs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    # Cap the job so a wedged step (e.g. a hung test or a stuck DB wait) fails the
    # run instead of burning a full 6h runner. The suite's own per-test timeout
    # (run-tests.mjs --test-timeout) is the first line of defense; this is the backstop.
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure ~/.ssh exists for devcontainer bind mount
        run: mkdir -p ~/.ssh

      - name: Run checks in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          # This automatically builds the devcontainer, starts the compose services (like db),
          # runs the postCreateCommand (which installs deps and migrates the db),
          # and then executes the runCmd.
          # Build first: tests resolve workspace packages (@printstream/shared,
          # @printstream/bridge-runtime) through their dist/ entry points, which
          # don't exist yet on a fresh install.
          runCmd: npm run build && npm run validate
