# Publishes the open-core Docker images to GHCR so self-hosters can `docker pull`
# instead of building from source. Rolling model: every push to the public repo's
# `main` (i.e. each `npm run export:public` snapshot) rebuilds and republishes
# `:latest`, plus an immutable `:sha-<short>` for pinning a specific build.
#
# Two images:
#   printstream          - the combined app (web + API + bridge in one image; the
#                          entrypoint runs `api` by default or `bridge` on demand).
#                          Published multi-arch (linux/amd64 + linux/arm64) so it
#                          runs on Raspberry Pi / ARM NAS as well as x86 hosts.
#   printstream-slicer   - the optional server-side slicer (bundles the x86 Bambu
#                          Studio CLI, so amd64 only).
#
# arm64 is built NATIVELY on GitHub's `ubuntu-24.04-arm` runners rather than under
# QEMU emulation: emulated Node + native-dep builds (the Prisma query engine in
# particular) are slow and flaky, and `prisma generate` reliably failed under
# emulation. Building each arch on its own CPU also bakes the matching native
# Prisma engine into each image, so no `binaryTargets` entry is required in
# schema.prisma. Per-arch images are pushed by digest, then merged into a single
# multi-arch tag (`docker buildx imagetools create`).
#
# This file ships into the public repo via the snapshot export and is GUARDED to
# run ONLY there: the private monorepo deploys over SSH and must never publish an
# image built from private (cloud) source. See docs/open-core.md.
name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer snapshot supersedes an in-flight one; don't pile up :latest pushes.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the combined app image once per architecture on a native runner and
  # push each result by digest (no tag yet — the merge job assembles the tags).
  build-app:
    # Only the public open-core repo publishes; skipped in the private mirror.
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/printstreamapp/printstream,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=printstream-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=printstream-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-printstream-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge the per-arch digests into a single multi-arch manifest and tag it.
  merge-app:
    needs: build-app
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-printstream-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/printstreamapp/printstream@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ghcr.io/printstreamapp/printstream:latest

  # Slicer bundles the x86 Bambu Studio CLI, so it stays amd64-only and is pushed
  # directly with tags (no per-arch merge needed).
  publish-slicer:
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream-slicer
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/slicer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=printstream-slicer
          cache-to: type=gha,mode=max,scope=printstream-slicer
