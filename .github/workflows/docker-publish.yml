# Publishes the open-core Docker images to GHCR so self-hosters can `docker pull`
# instead of building from source. Rolling model: every push to the public repo's
# `main` (i.e. each `npm run export:public` snapshot) rebuilds and republishes
# `:latest`, plus an immutable `:sha-<short>` for pinning a specific build.
#
# Three images:
#   printstream          - the combined app (web + API + bridge in one image; the
#                          entrypoint runs `api` by default or `bridge` on demand).
#                          Published multi-arch (linux/amd64 + linux/arm64) so it
#                          runs on Raspberry Pi / ARM NAS as well as x86 hosts.
#   printstream-bridge   - the slim, bridge-only image (Dockerfile `bridge` target):
#                          a single esbuild-bundled runtime on the base image, for
#                          running just a LAN bridge host. Also multi-arch.
#   printstream-slicer   - the optional server-side slicer. It bundles the x86
#                          Bambu Studio CLI; on arm64 that CLI runs under qemu-user
#                          emulation against a baked x86-64 sysroot, so this image is
#                          also published multi-arch (native runner per arch).
#
# arm64 is built NATIVELY on GitHub's `ubuntu-24.04-arm` runners rather than under
# QEMU emulation: emulated Node + native-dep builds (the Prisma query engine in
# particular) are slow and flaky, and `prisma generate` reliably failed under
# emulation. Building each arch on its own CPU also bakes the matching native
# Prisma engine into each image, so no `binaryTargets` entry is required in
# schema.prisma. Per-arch images are pushed by digest, then merged into a single
# multi-arch tag (`docker buildx imagetools create`).
#
# This file ships into the public repo via the snapshot export and is GUARDED to
# run ONLY there: the private monorepo deploys over SSH and must never publish an
# image built from private (cloud) source. See docs/open-core.md.
name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer snapshot supersedes an in-flight one; don't pile up :latest pushes.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the combined app image once per architecture on a native runner and
  # push each result by digest (no tag yet — the merge job assembles the tags).
  build-app:
    # Only the public open-core repo publishes; skipped in the private mirror.
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake the running-image identity for the footer version + GHCR update
          # hint. PUBLISHED=true marks this as the open-core image with a registry
          # update channel; REVISION is the commit shown to users.
          build-args: |
            PRINTSTREAM_IMAGE_REVISION=${{ github.sha }}
            PRINTSTREAM_IMAGE_PUBLISHED=true
          outputs: type=image,name=ghcr.io/printstreamapp/printstream,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=printstream-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=printstream-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-printstream-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      # The slim, bridge-only image (Dockerfile `bridge` target): the published
      # image people pull to run just a LAN bridge, without the API/web/Prisma
      # weight of the combined image. Same multi-arch + push-by-digest pattern.
      - id: build-bridge
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: bridge
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/printstreamapp/printstream-bridge,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=printstream-bridge-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=printstream-bridge-${{ matrix.arch }}

      - name: Export bridge digest
        run: |
          mkdir -p "${{ runner.temp }}/digests-bridge"
          digest="${{ steps.build-bridge.outputs.digest }}"
          touch "${{ runner.temp }}/digests-bridge/${digest#sha256:}"

      - name: Upload bridge digest
        uses: actions/upload-artifact@v4
        with:
          name: bridge-digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests-bridge/*
          if-no-files-found: error
          retention-days: 1

  # Merge the per-arch digests into a single multi-arch manifest and tag it.
  merge-app:
    needs: build-app
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-printstream-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/printstreamapp/printstream@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ghcr.io/printstreamapp/printstream:latest

  # Merge the per-arch bridge digests into a single multi-arch manifest and tag it.
  merge-bridge:
    needs: build-app
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: bridge-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream-bridge
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/printstreamapp/printstream-bridge@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ghcr.io/printstreamapp/printstream-bridge:latest

  # The slicer bundles the x86 Bambu Studio CLI. On arm64 that CLI runs under
  # qemu-user emulation against an x86-64 sysroot baked into the image at build time
  # (apps/slicer/Dockerfile), so the image is published multi-arch like the app image:
  # build each arch on its own native runner, push by digest, then merge into one tag.
  # Building natively (not under QEMU) keeps the arm64 build's npm install and the
  # sysroot apt closure on a real arm64 CPU.
  build-slicer:
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream-slicer

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/slicer/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/printstreamapp/printstream-slicer,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=printstream-slicer-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=printstream-slicer-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: slicer-digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge the per-arch slicer digests into a single multi-arch manifest and tag it.
  merge-slicer:
    needs: build-slicer
    if: github.repository == 'PrintStreamApp/printstream'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: slicer-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/printstreamapp/printstream-slicer
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/printstreamapp/printstream-slicer@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ghcr.io/printstreamapp/printstream-slicer:latest
