# Builds the self-hosted PrintStream server as native single-file executables
# (Node SEA) and publishes them on a GitHub Release.
#
# Content-addressed, like the bridge — there is no semver version. Every push to
# `main` computes a release fingerprint (scripts/server-release-fingerprint.sh);
# if a `server-<fp12>` Release already exists the build is skipped, otherwise all
# targets are built and attached to a new Release whose tag *is* that fingerprint
# (the release action creates it — no manual tagging).
#
# All targets (Linux x64/arm64, Windows x64) are cross-built from one Linux
# runner: the SEA build downloads each target's pinned Node and self-fetches the
# matching Prisma engine + portable PostgreSQL. The Windows `.exe` is
# Authenticode-signed with Azure Trusted Signing on a Windows runner (the
# bridge's scheme), auto-skipped until the TRUSTED_SIGNING_* repo config exists.
# Linux binaries are not signed here.
name: server-packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    # Auto-publishes only from the canonical OSS repo (no-op in the private
    # monorepo, where the file also lives as the export source). A manual
    # `workflow_dispatch` runs anywhere — it builds + signs + uploads the
    # binaries as run artifacts to download and test, without cutting a Release
    # (see the `release` job's `push`-only gate). A fork can change the slug.
    if: github.repository == 'PrintStreamApp/printstream' || github.event_name == 'workflow_dispatch'
    outputs:
      short: ${{ steps.fingerprint.outputs.short }}
      already_published: ${{ steps.published.outputs.already_published }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute server release fingerprint
        id: fingerprint
        run: |
          fingerprint="$(bash scripts/server-release-fingerprint.sh)"
          echo "short=${fingerprint:0:12}" >> "$GITHUB_OUTPUT"
          echo "Server release fingerprint: $fingerprint"

      - name: Check whether this build is already published
        id: published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "server-${{ steps.fingerprint.outputs.short }}" >/dev/null 2>&1; then
            echo 'already_published=true' >> "$GITHUB_OUTPUT"
          else
            echo 'already_published=false' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.already_published == 'false'
    runs-on: ubuntu-latest
    env:
      # `prisma.config.ts` requires DATABASE_URL to load; `prisma generate` only
      # needs it *present* (it generates the client + engines, never connects).
      DATABASE_URL: postgresql://localhost:5432/printstream?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces + Prisma engines + web bundle
        run: |
          npm run db:generate
          npm run build

      - name: Install osslsigncode (strip Node's Windows signature pre-injection)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq osslsigncode

      - name: Build SEA binaries
        # The build self-fetches each target's portable PostgreSQL via `npm pack`
        # (the `@embedded-postgres/<key>` packages have os/cpu guards that block a
        # normal cross-platform `npm install`).
        run: |
          for target in linux-x64 linux-arm64 win32-x64; do
            npm run package:sea --workspace @printstream/server -- --target "$target"
          done

      - name: Upload unsigned binaries
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: apps/server/release/sea/*
          if-no-files-found: error

  sign-windows:
    needs:
      - detect
      - build
    # Skipped automatically until Trusted Signing is configured on the repo.
    if: needs.detect.outputs.already_published == 'false' && vars.TRUSTED_SIGNING_ACCOUNT != ''
    runs-on: windows-latest
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          name: server-binaries
          path: server-binaries

      - name: Authenticode-sign the Windows executable
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: server-binaries
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed executable
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries-signed
          path: server-binaries/*.exe
          if-no-files-found: error

  release:
    needs:
      - detect
      - build
      - sign-windows
    # Only a push to the canonical OSS repo cuts a Release; a manual dispatch
    # stops at uploaded artifacts. Runs whether signing ran or was skipped, but
    # not when it failed.
    if: |
      always()
        && github.event_name == 'push'
        && github.repository == 'PrintStreamApp/printstream'
        && needs.detect.outputs.already_published == 'false'
        && needs.build.result == 'success'
        && (needs.sign-windows.result == 'success' || needs.sign-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          name: server-binaries
          path: dist

      - name: Overlay the signed Windows executable (when present)
        if: needs.sign-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: server-binaries-signed
          path: dist

      - name: Checksums
        working-directory: dist
        run: sha256sum printstream-* > SHA256SUMS

      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-${{ needs.detect.outputs.short }}
          name: Server ${{ needs.detect.outputs.short }}
          body: |
            Self-hosted PrintStream native builds (content-addressed; fingerprint `${{ needs.detect.outputs.short }}`).

            Download the binary for your platform and run it — embedded database, no dependencies.
            The Windows `.exe` covers Windows 11 ARM64 via x64 emulation.
          files: dist/*
