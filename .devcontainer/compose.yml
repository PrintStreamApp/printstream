# Dev container compose. Two important details for permission hygiene:
#
# 1. We do NOT pin `user:` here. The devcontainer feature
#    (`updateRemoteUserUID: true` in devcontainer.json) rebuilds the
#    image so the in-image `node` user's UID/GID match the host user,
#    then runs everything as `remoteUser: node`. Pinning `user:` here
#    defeats that and leads to root-owned files in the bind mount on
#    hosts where the host UID is not 1000.
#
# 2. The workspace is bind-mounted from the host. Anything you create
#    or modify inside the container is owned by the rebuilt `node`
#    user, which now has the same UID/GID as your host user, so
#    editing the same files outside the container Just Works.
services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: printstream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d printstream"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  # The slicer runs INSIDE the workspace container in dev (scripts/dev/run-dev.mjs, x86) — there is
  # no sibling slicer service. On arm64 point SLICER_SERVICE_URL at a remote x86 slicer.
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    working_dir: /workspace/printstream
    group_add:
      - "${DOCKER_GID:-1001}"
    volumes:
      - ..:/workspace/printstream:cached
      # Persists the in-workspace slicer's BambuStudio AppImage + generated profile caches
      # (opt-in: PRINTSTREAM_DEV_SLICER=workspace) so they survive rebuilds and download once.
      - slicer-dev-data:/home/node/.printstream-slicer

volumes:
  postgres-dev-data:
    name: ${DEVCONTAINER_POSTGRES_VOLUME:-printstream-postgres-dev-data}
  slicer-dev-data:
    name: ${DEVCONTAINER_SLICER_DATA_VOLUME:-printstream-slicer-dev-data}
