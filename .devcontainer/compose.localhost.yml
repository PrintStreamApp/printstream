# Default dev overlay: publish ports to the host for single-stack local dev so the
# app is reachable at http://localhost:5173 (and the API directly at
# http://localhost:4000). This is the out-of-the-box path for new contributors.
#
# All host port publishing lives here, NOT in the base compose, so the shared-host
# (nginx) variant publishes nothing and can't collide with another stack's ports.
# db (5432) and the in-workspace slicer (4010, served inside the workspace
# container) are convenience publishes for connecting host tools; the app itself
# reaches them over the compose network by service name.
#
# Variant selection: devcontainer.json picks the overlay via the host env var
# PRINTSTREAM_DEVCONTAINER_VARIANT, defaulting to `localhost` (this file). Set it
# to `nginx` on the shared-nginx host to use compose.nginx.yml instead.
services:
  workspace:
    ports:
      - "4000:4000"
      - "5173:5173"
      - "4010:4010"
  db:
    ports:
      - "5432:5432"
