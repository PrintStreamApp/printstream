# One-off overlay for the shared-nginx server (dev.printstream.app). Selected
# INSTEAD of compose.localhost.yml by exporting PRINTSTREAM_DEVCONTAINER_VARIANT=nginx
# on the host that launches the devcontainer (see devcontainer.json). Rather than
# publishing host ports, the workspace joins the external `nginx_default` network
# and takes a fixed container name so the nginx container can resolve it as an
# upstream by name (see ../nginx.conf, which proxies to printstream-dev-web:5173).
#
# Requires the external `nginx_default` network to already exist on the host,
# which is why it is opt-in and not part of the default devcontainer stack.
services:
  workspace:
    container_name: printstream-dev-web
    # Redeclare the base network alongside nginx_default so the merged result
    # is correct regardless of how Compose merges service-level network lists.
    networks:
      - default
      - nginx_default
networks:
  nginx_default:
    external: true
