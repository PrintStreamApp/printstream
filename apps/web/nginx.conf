# nginx config baked into apps/web/Dockerfile. Single source of truth
# for the reverse-proxy layout; mirrors game-is-up's apps/web/nginx.conf
# with the bits PrintStream additionally needs:
#
# - `/ws` block with Upgrade/Connection headers for the WebSocket fan-out.
# - `proxy_buffering off` on `/api/` for MJPEG camera streams and the
#   log tail; the default buffer would hold frames forever.
# - Larger `client_max_body_size` for library and plugin archive uploads.
# - `Service-Worker-Allowed: /` so the SW served at `/sw.js` (and the
#   imported `/push-handler.js`) can claim the whole origin, which Web
#   Push requires.
# - PWA static files (`index.html`, `sw.js`, `registerSW.js`,
#   `manifest.webmanifest`) marked no-store so app updates and push
#   subscriptions don't get pinned to a stale version.
server {
  listen 8080;
  server_name _;

  # Match the API's default 1 GB upload ceiling so large 3MF uploads
  # do not fail at the reverse proxy before multer can enforce its own limit.
  client_max_body_size 1g;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets — safe to cache for a year.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header Service-Worker-Allowed "/" always;
  }

  location = /registerSW.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /push-handler.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /api/bridge-runtime/connect {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Camera (MJPEG) and log-tail endpoints stream indefinitely.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location /ws {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }
}
